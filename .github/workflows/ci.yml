name: CI

# Déclenchement: uniquement sur les pull requests (création, push de
# nouveaux commits, réouverture). Pas de run "post-merge" sur main —
# la CI a déjà tourné juste avant le merge.
on:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # Bonus: validate manifest.json is parseable and the extension can
      # be packaged (catches mistakes that would only show up at install time).
      - name: Validate manifest
        run: node -e "JSON.parse(require('fs').readFileSync('manifest.json', 'utf8')); console.log('manifest.json OK')"
